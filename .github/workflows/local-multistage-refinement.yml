name: local-multistage-refinement

on:
  push:
    paths:
      - rfp-markdown/**/*.md
    paths-ignore:
      - rfp-markdown/generated/**/*.md
      - rfp-markdown/audit/**
  workflow_dispatch:
    inputs:
      file_path:
        description: Optional markdown path to process
        required: false
        type: string
      uploads_glob:
        description: Optional additional markdown glob for manual runs
        required: false
        type: string

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure output directories
        run: |
          set -euo pipefail
          mkdir -p rfp-markdown/generated
          mkdir -p rfp-markdown/audit
          mkdir -p .tmp

      - name: Resolve targets
        id: prep
        run: |
          set -euo pipefail
          : > .tmp/targets.txt

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.file_path }}" ]]; then
              echo "${{ inputs.file_path }}" >> .tmp/targets.txt
            elif [[ -n "${{ inputs.uploads_glob }}" ]]; then
              compgen -G "${{ inputs.uploads_glob }}" >> .tmp/targets.txt || true
            else
              find rfp-markdown -type f -name '*.md' ! -path 'rfp-markdown/generated/*' ! -path 'rfp-markdown/audit/*' | sort >> .tmp/targets.txt
            fi
          else
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -E '^rfp-markdown/.+\.md$' | grep -Ev '^rfp-markdown/(generated|audit)/' | sort >> .tmp/targets.txt || true
          fi

          sort -u .tmp/targets.txt -o .tmp/targets.txt || true
          grep -E '^rfp-markdown/.+\.md$' .tmp/targets.txt > .tmp/targets.filtered.txt || true
          mv .tmp/targets.filtered.txt .tmp/targets.txt || true

          run_dir="rfp-markdown/audit/${{ github.run_id }}-${{ github.run_attempt }}"
          mkdir -p "$run_dir"
          echo "run_dir=$run_dir" >> "$GITHUB_OUTPUT"

          target_count="$(wc -l < .tmp/targets.txt | tr -d ' ')"
          echo "target_count=$target_count" >> "$GITHUB_OUTPUT"

          context_file="$run_dir/knowledge-context.md"
          : > "$context_file"
          if [[ -d knowledge/rfp ]]; then
            echo "# knowledge/rfp" >> "$context_file"
            while IFS= read -r f; do
              echo "" >> "$context_file"
              echo "## $f" >> "$context_file"
              cat "$f" >> "$context_file"
            done < <(find knowledge/rfp -type f -name '*.md' | sort)
          fi
          if [[ -d knowledge/formatting ]]; then
            echo "" >> "$context_file"
            echo "# knowledge/formatting" >> "$context_file"
            while IFS= read -r f; do
              echo "" >> "$context_file"
              echo "## $f" >> "$context_file"
              cat "$f" >> "$context_file"
            done < <(find knowledge/formatting -type f -name '*.md' | sort)
          fi

          # Assets are preprocessed in a dedicated cache step and appended to this context file.

      - name: Cache assets references for analysis context
        run: |
          set -euo pipefail
          RUN_DIR="${{ steps.prep.outputs.run_dir }}"
          CONTEXT_FILE="$RUN_DIR/knowledge-context.md"
          CACHE_DIR="$RUN_DIR/assets-cache"
          INDEX_FILE="$CACHE_DIR/assets-index.md"

          mkdir -p "$CACHE_DIR"
          : > "$INDEX_FILE"

          if [[ ! -d assets ]]; then
            exit 0
          fi

          echo "# assets cache" >> "$INDEX_FILE"

          while IFS= read -r src; do
            rel="${src#assets/}"
            safe="${rel//\//__}"
            out="$CACHE_DIR/${safe}.txt"

            {
              echo "# source: $src"
              echo ""
            } > "$out"

            case "$src" in
              *.md|*.txt|*.json|*.yaml|*.yml)
                cat "$src" >> "$out"
                ;;
              *.pdf)
                if command -v pdftotext >/dev/null 2>&1; then
                  pdftotext "$src" - 2>/dev/null | sed '/^\s*$/d' | head -n 800 >> "$out" || true
                else
                  echo "[pdf reference present; pdftotext unavailable on runner]" >> "$out"
                fi
                ;;
              *.docx)
                if command -v docx2txt >/dev/null 2>&1; then
                  docx2txt "$src" - 2>/dev/null | head -n 800 >> "$out" || true
                else
                  echo "[docx reference present; docx2txt unavailable on runner]" >> "$out"
                fi
                ;;
              *)
                echo "[unsupported/binary reference file type]" >> "$out"
                ;;
            esac

            echo "- $src -> ${out#${RUN_DIR}/}" >> "$INDEX_FILE"
          done < <(find assets -type f | sort)

          {
            echo ""
            echo "# assets"
            echo ""
            cat "$INDEX_FILE"
            echo ""
          } >> "$CONTEXT_FILE"

          while IFS= read -r cached; do
            echo "" >> "$CONTEXT_FILE"
            echo "## cached: ${cached#${RUN_DIR}/}" >> "$CONTEXT_FILE"
            cat "$cached" >> "$CONTEXT_FILE"
          done < <(find "$CACHE_DIR" -type f -name '*.txt' | sort)

      - name: Run critique, refine, and formatting stages
        if: steps.prep.outputs.target_count != '0'
        run: |
          set -euo pipefail

          RUN_DIR="${{ steps.prep.outputs.run_dir }}"
          CONTEXT_FILE="$RUN_DIR/knowledge-context.md"
          LAST_SUCCESS="$CONTEXT_FILE"
          echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

          transform_stage_a() {
            local in_file="$1"
            local out_file="$2"
            {
              echo "## Stage A Critique"
              echo ""
              echo "- Local deterministic review"
              echo "- Flags TODO/TBD/FIXME markers"
              echo ""
              awk '{
                if ($0 ~ /(TODO|TBD|FIXME)/) {
                  print "[FLAG] " $0
                } else {
                  print $0
                }
              }' "$in_file"
              echo ""
              echo "### Stage A Notes"
              echo "- Lines: $(wc -l < "$in_file" | tr -d ' ')"
              echo "- Flags: $(grep -Eic 'TODO|TBD|FIXME' "$in_file" || true)"
            } > "$out_file"
          }

          transform_stage_b() {
            local in_file="$1"
            local out_file="$2"
            {
              echo "## Stage B Executive Refinement"
              echo ""
              echo "### Executive Summary"
              awk 'NF > 0 { print "- " $0; c += 1; if (c >= 8) exit }' "$in_file"
              echo ""
              echo "### Refined Body"
              awk '{
                line=$0
                gsub(/^\[FLAG\][[:space:]]*/, "", line)
                print line
              }' "$in_file"
            } > "$out_file"
          }

          transform_stage_c() {
            local in_file="$1"
            local out_file="$2"
            {
              echo "## Stage C Final Markdown"
              echo ""
              awk '{
                line=$0
                gsub(/[ \t]+$/, "", line)
                print line
              }' "$in_file" | awk 'BEGIN{blank=0} {
                if ($0 == "") {
                  if (blank == 0) {
                    print ""
                  }
                  blank = 1
                } else {
                  print $0
                  blank = 0
                }
              }'
            } > "$out_file"
          }

          if ! while IFS= read -r target; do
            [[ -z "$target" ]] && continue
            [[ ! -f "$target" ]] && continue

            stem="$(basename "$target" .md)"
            case_dir="$RUN_DIR/$stem"
            mkdir -p "$case_dir/stage-a" "$case_dir/stage-b" "$case_dir/stage-c"

            cp "$target" "$case_dir/original.md"
            LAST_SUCCESS="$case_dir/original.md"
            echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

            stage_a_md="$case_dir/stage-a/output.md"
            stage_b_md="$case_dir/stage-b/output.md"
            stage_c_md="$case_dir/stage-c/output.md"

            printf '{"mode":"local-transform","stage":"A","target":"%s"}\n' "$target" > "$case_dir/stage-a/request.json"
            transform_stage_a "$case_dir/original.md" "$stage_a_md"
            printf '{"message":"local deterministic transform completed for stage A"}\n' > "$case_dir/stage-a/raw-response.json"
            LAST_SUCCESS="$stage_a_md"
            echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

            printf '{"mode":"local-transform","stage":"B","target":"%s"}\n' "$target" > "$case_dir/stage-b/request.json"
            transform_stage_b "$stage_a_md" "$stage_b_md"
            printf '{"message":"local deterministic transform completed for stage B"}\n' > "$case_dir/stage-b/raw-response.json"
            LAST_SUCCESS="$stage_b_md"
            echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

            printf '{"mode":"local-transform","stage":"C","target":"%s"}\n' "$target" > "$case_dir/stage-c/request.json"
            transform_stage_c "$stage_b_md" "$stage_c_md"
            printf '{"message":"local deterministic transform completed for stage C"}\n' > "$case_dir/stage-c/raw-response.json"
            LAST_SUCCESS="$stage_c_md"
            echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

            final_out="rfp-markdown/generated/${stem}-final.md"
            cp "$stage_c_md" "$final_out"
            LAST_SUCCESS="$final_out"
            echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

            summary="$case_dir/run-summary.md"
            {
              echo '# Run Summary'
              echo ''
              echo "- target: $target"
              echo "- mode: local-transform"
              echo "- stage_a_output: $stage_a_md"
              echo "- stage_b_output: $stage_b_md"
              echo "- stage_c_output: $stage_c_md"
              echo "- final_output: $final_out"
              echo "- last_success_artifact: $LAST_SUCCESS"
            } > "$summary"
          done < .tmp/targets.txt; then
            echo "Pipeline failed. Last successful artifact: $(cat "$RUN_DIR/last-success-artifact.txt")" > "$RUN_DIR/failure-summary.txt"
            exit 1
          fi

      - name: Commit generated outputs when changed
        if: steps.prep.outputs.target_count != '0'
        run: |
          set -euo pipefail
          RUN_DIR="${{ steps.prep.outputs.run_dir }}"

          if git diff --quiet -- rfp-markdown/generated; then
            echo "No generated markdown changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rfp-markdown/generated

          if ! git commit -m "chore(refinement): update generated markdown outputs"; then
            echo "Generated files unchanged at commit time."
            exit 0
          fi

          if ! git push; then
            manual="$RUN_DIR/manual-commit-instructions.md"
            {
              echo '# Manual Commit Required'
              echo ''
              echo 'Automated push failed (likely branch protection or token permissions).'
              echo ''
              echo 'Run these commands locally:'
              echo ''
              echo 'git checkout ${{ github.ref_name }}'
              echo 'git pull'
              echo 'git add rfp-markdown/generated'
              echo 'git commit -m "chore(refinement): update generated markdown outputs"'
              echo 'git push'
            } > "$manual"
          fi

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refinement-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.prep.outputs.run_dir }}
          if-no-files-found: warn

      - name: Fail with precise last-success message
        if: failure()
        run: |
          set -euo pipefail
          RUN_DIR="${{ steps.prep.outputs.run_dir }}"
          if [[ -f "$RUN_DIR/failure-summary.txt" ]]; then
            cat "$RUN_DIR/failure-summary.txt" >&2
          else
            echo "Pipeline failed before artifact tracking initialized." >&2
          fi
          exit 1
